name: Setup Release Environment
description: Setup pnpm and Node.js with registry auth, and install dependencies

inputs:
  registry-url:
    description: npm registry URL to configure for @adobe scope packages
    required: true
  token:
    description: Auth token for the npm registry
    required: true

runs:
  using: composite
  steps:
    # pnpm version will be read from packageManager field in package.json
    - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

    # First setup-node: no registry/scope so pnpm install resolves @adobe/* from
    # public npm. Avoids 404 on packages (e.g. @adobe/aio-lib-*) not present in
    # Artifactory, which would otherwise fail pnpm's minimumReleaseAge supply-chain check.
    # token omitted — uses default github.token for Node.js distribution downloads.
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: lts/*
        cache: "pnpm"

    - run: pnpm install --frozen-lockfile
      shell: bash

    # Write NODE_AUTH_TOKEN before the second setup-node so authutil.ts picks up the
    # real token. authutil.ts reads process.env.NODE_AUTH_TOKEN and re-exports it —
    # if absent it falls back to a placeholder. env: on uses: steps is not supported
    # in composite actions, so $GITHUB_ENV is the only injection point.
    - run: echo "NODE_AUTH_TOKEN=${{ inputs.token }}" >> "$GITHUB_ENV"
      shell: bash

    # Second setup-node: Node.js is already installed (cache hit), so this only runs
    # authutil.ts to write @adobe:registry + _authToken to $RUNNER_TEMP/.npmrc and
    # set NPM_CONFIG_USERCONFIG — configuring Artifactory routing for publish steps.
    # cache omitted to avoid registering a second post-job pnpm cache save.
    # token omitted — uses default github.token.
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: lts/*
        registry-url: ${{ inputs.registry-url }}
        scope: "@adobe"
