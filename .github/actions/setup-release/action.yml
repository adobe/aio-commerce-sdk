name: Setup Release Environment
description: Setup pnpm and Node.js with registry auth, and install dependencies

inputs:
  registry-url:
    description: npm registry URL to configure for @adobe scope packages
    required: true
  node-auth-token:
    description: Auth token for the npm registry
    required: true

runs:
  using: composite
  steps:
    # pnpm version will be read from packageManager field in package.json
    - uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8

    # Exports NODE_AUTH_TOKEN via core.exportVariable, making it available
    # to all subsequent steps in the job without needing to set it explicitly.
    - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: lts/*
        cache: "pnpm"
        registry-url: ${{ inputs.registry-url }}
        scope: "@adobe"
        node-auth-token: ${{ inputs.node-auth-token }}

    - run: pnpm install --frozen-lockfile
      shell: bash
