# See https://github.com/actions/labeler

"pkg: aio-commerce-sdk":
  - changed-files:
      - any-glob-to-any-file: "packages/aio-commerce-sdk/**"

"pkg: aio-commerce-lib-auth":
  - changed-files:
      - any-glob-to-any-file: "packages/aio-commerce-lib-auth/**"

"pkg: aio-commerce-lib-core":
  - changed-files:
      - any-glob-to-any-file: "packages/aio-commerce-lib-core/**"

"pkg: aio-commerce-lib-api":
  - changed-files:
      - any-glob-to-any-file: "packages/aio-commerce-lib-api/**"

"pkg: aio-commerce-lib-events":
  - changed-files:
      - any-glob-to-any-file: "packages/aio-commerce-lib-events/**"

"pkg: aio-commerce-lib-config":
  - changed-files:
      - any-glob-to-any-file: "packages/aio-commerce-lib-config/**"

"pkg: aio-commerce-lib-app":
  - changed-files:
      - any-glob-to-any-file: "packages/aio-commerce-lib-app/**"

"pkg: aio-commerce-lib-admin-ui":
  - changed-files:
      - any-glob-to-any-file: "packages/aio-commerce-lib-admin-ui/**"

"pkg: aio-commerce-lib-webhooks":
  - changed-files:
      - any-glob-to-any-file: "packages/aio-commerce-lib-webhooks/**"
      
"private-pkg: scripting-utils":
  - changed-files:
      - any-glob-to-any-file: "packages-private/scripting-utils/**"

"private-pkg: common-utils":
  - changed-files:
      - any-glob-to-any-file: "packages-private/common-utils/**"

"pkg: aio-commerce-plugin-app-management":
  - changed-files:
      - any-glob-to-any-file: "plugins/commerce/app-management/**"

"pkg: aio-commerce-plugin-app-migration":
  - changed-files:
      - any-glob-to-any-file: "plugins/commerce/app-migration/**"

"scripts":
  - changed-files:
      - any-glob-to-any-file: "scripts/**"

"generator":
  - changed-files:
      - any-glob-to-any-file: "turbo/generators/**"

"spec":
  - changed-files:
      - any-glob-to-any-file: "specs/features/**"

"cfg: tsdown":
  - changed-files:
      - any-glob-to-any-file: "configs/tsdown/**"

"cfg: turbo":
  - changed-files:
      - any-glob-to-any-file: "turbo.json"

"cfg: typedoc":
  - changed-files:
      - any-glob-to-any-file: "configs/typedoc/**"

"cfg: typescript":
  - changed-files:
      - any-glob-to-any-file: "configs/typescript/**"

"cfg: vitest":
  - changed-files:
      - any-glob-to-any-file: "configs/vitest/**"

"with-changeset":
  - changed-files:
      - any-glob-to-any-file: ".changeset/**"

"without-changeset":
  - all:
      - changed-files:
          - any-glob-to-any-file: "**/*"
          - all-globs-to-all-files: "!.changeset/**"
