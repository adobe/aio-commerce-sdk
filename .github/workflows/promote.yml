name: Promote to Release

on:
  workflow_dispatch:
    inputs:
      commit_sha:
        description: "Commit SHA on main to promote (leave empty for latest)"
        required: false
        type: string

jobs:
  promote:
    name: Promote to Release
    if: github.repository == 'adobe/aio-commerce-sdk'
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Promote to release
        env:
          COMMIT_SHA: ${{ inputs.commit_sha }}
          GITHUB_TOKEN: ${{ github.token }}
        run: ./.github/scripts/promote.sh "$COMMIT_SHA"
