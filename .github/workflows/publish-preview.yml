name: Publish Preview

on:
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      pr_number:
        description: "PR number to publish preview packages for"
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.event.issue.number || github.event.inputs.pr_number }}
  cancel-in-progress: true

jobs:
  prepare:
    name: Resolve PR
    if: |
      github.repository == 'adobe/aio-commerce-sdk' &&
      (
        (github.event_name == 'workflow_dispatch') ||
        (github.event.issue.pull_request && github.event.comment.user.type != 'Bot' && contains(github.event.comment.body, '/snapshot'))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
    outputs:
      pr_number: ${{ steps.pr.outputs.number }}
      head_sha: ${{ steps.pr_details.outputs.head_sha }}

    steps:
      - name: Check actor permission
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.actor,
            });

            if (data.permission !== 'admin') {
              core.setFailed(`@${context.actor} does not have admin permission on this repository (actual: ${data.permission}).`);
            }

      - name: Get PR number
        id: pr
        env:
          PR_NUMBER: ${{ github.event.inputs.pr_number }}
          ISSUE_NUMBER: ${{ github.event.issue.number }}
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            echo "number=$PR_NUMBER" >> $GITHUB_OUTPUT
          else
            echo "number=$ISSUE_NUMBER" >> $GITHUB_OUTPUT
          fi

      - name: Get PR head SHA
        id: pr_details
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: Number(process.env.PR_NUMBER),
            });

            core.setOutput('head_sha', pr.data.head.sha);

  release:
    name: Publish Preview Packages
    needs: prepare
    uses: ./.github/workflows/publish-shared.yml
    permissions:
      contents: write
      pull-requests: write
      packages: write
      id-token: write
    with:
      channel: internal
      ref: ${{ needs.prepare.outputs.head_sha }}
      snapshot_tag: alpha
      skip_github_releases: true
    secrets:
      REGISTRY_URL: ${{ secrets.ARTIFACTORY_REPO_PUBLISH_URL }}
      REGISTRY_AUTH_TOKEN: ${{ secrets.ARTIFACTORY_API_TOKEN }}

  comment:
    name: Comment on PR
    needs: [prepare, release]
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - name: Post published packages comment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          PR_NUMBER: ${{ needs.prepare.outputs.pr_number }}
          COMMENT_BODY: ${{ needs.release.outputs.commentBody }}
        with:
          script: |
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: Number(process.env.PR_NUMBER),
              body: process.env.COMMENT_BODY,
            });
