name: Publish Public

on:
  workflow_dispatch:
  push:
    branches:
      - release

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release Public
    if: github.repository == 'adobe/aio-commerce-sdk'
    uses: ./.github/workflows/publish-shared.yml
    permissions:
      contents: write
      pull-requests: write
      packages: write
      id-token: write
    with:
      channel: public
    secrets:
      REGISTRY_AUTH_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}
      REGISTRY_PACKAGE_BASE_URL: "https://npmx.dev/package"
      REGISTRY_URL: "https://registry.npmjs.org"

  notify:
    name: Notify Slack
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Send Slack notification
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v2
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: ${{ needs.release.outputs.SLACK_WEBHOOK_PAYLOAD }}

  back-sync:
    name: Back-sync to main
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create back-sync PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./.github/scripts/back-sync.sh
