name: Publish Public

on:
  workflow_dispatch:
  push:
    branches:
      - release

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release Public
    if: github.repository == 'adobe/aio-commerce-sdk'
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    permissions:
      contents: write
      pull-requests: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-release
        with:
          registry-url: "https://registry.npmjs.org"
          token: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}

      - name: Build packages
        run: pnpm turbo build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@a45c4d594aa4e2c509dc14a9f2b3b67ba3780d0d # v1.9.0
        with:
          version: pnpm release:version
          publish: pnpm release:publish
          commit: "ci: release packages"
          title: "[CI] Release Packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ github.token }}

      - name: Notify on Slack
        if: steps.changesets.outputs.published == 'true'
        uses: ./.github/actions/notify-slack
        with:
          published-packages: ${{ steps.changesets.outputs.publishedPackages }}
          registry-package-base-url: "https://npmx.dev/package"
          release-channel: public
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}

      - name: Generate Release Notes
        id: release-notes
        if: steps.changesets.outputs.published == 'true'
        uses: ./.github/actions/release-notes
        with:
          published-packages: ${{ steps.changesets.outputs.publishedPackages }}
          release-channel: public
          notes-enabled: "false"
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ secrets.AWS_REGION }}


  back-sync:
    name: Back-sync to main
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Merge release into main
        run: ./.github/scripts/back-sync.sh
