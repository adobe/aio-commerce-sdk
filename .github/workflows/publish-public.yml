name: Publish Public

on:
  workflow_dispatch:
  push:
    branches:
      - release

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release Public
    if: github.repository == 'adobe/aio-commerce-sdk'
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.changesets.outputs.publishedPackages }}
    permissions:
      contents: write
      pull-requests: write
      packages: write
      id-token: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-release
        with:
          registry-url: "https://registry.npmjs.org"
          node-auth-token: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}

      - name: Build packages
        run: pnpm turbo build

      - name: Create Release Pull Request or Publish
        id: changesets
        uses: changesets/action@63a615b9cd06ba9a3e6d13796c7fbcb080a60a0b # v1.8.0
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          commit: "ci: release packages"
          title: "[CI] Release Packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NPM_TOKEN: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}

      - name: Notify on Slack
        if: steps.changesets.outputs.published == 'true'
        uses: ./.github/actions/notify-slack
        with:
          published-packages: ${{ steps.changesets.outputs.publishedPackages }}
          registry-package-base-url: "https://npmx.dev/package"
          release-channel: public
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}

  mirror:
    name: Mirror to Artifactory
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: ./.github/actions/setup-release
        with:
          registry-url: ${{ secrets.ARTIFACTORY_REPO_PUBLISH_URL }}
          node-auth-token: ${{ secrets.ARTIFACTORY_API_TOKEN }}

      - name: Build packages
        run: pnpm turbo build

      - name: Mirror packages to registry
        run: pnpm changeset publish --no-git-tag

  back-sync:
    name: Back-sync to main
    needs: release
    if: needs.release.outputs.published == 'true'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Create back-sync PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: ./.github/scripts/back-sync.sh
