name: Release Shared

on:
  workflow_call:
    inputs:
      channel:
        required: true
        type: string
      ref:
        required: false
        type: string
        default: ""
      snapshot_tag:
        required: false
        type: string
        default: ""
      skip_github_releases:
        required: false
        type: boolean
        default: false
      notify_slack:
        required: false
        type: boolean
        default: true
      publish_only:
        required: false
        type: boolean
        default: false
        description: "Skip snapshot versioning and publish current package versions as-is"

    outputs:
      published:
        description: Whether packages were published
        value: ${{ jobs.release.outputs.published }}
      publishedPackages:
        description: JSON array of published packages
        value: ${{ jobs.release.outputs.publishedPackages }}

    secrets:
      REGISTRY_URL:
        required: true
      REGISTRY_PACKAGE_BASE_URL:
        required: false
      REGISTRY_AUTH_TOKEN:
        required: true
      SLACK_WEBHOOK_URL:
        required: false
jobs:
  release:
    name: Version or Release
    runs-on: ubuntu-latest
    outputs:
      published: ${{ steps.mirror.outputs.published || steps.snapshot.outputs.published || steps.changesets.outputs.published }}
      publishedPackages: ${{ steps.snapshot.outputs.publishedPackages || steps.changesets.outputs.publishedPackages }}
    permissions:
      contents: write
      pull-requests: write
      packages: write
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref }}

      # pnpm version will be read from packageManager field in package.json
      - name: Setup pnpm
        uses: pnpm/action-setup@078e9d416474b29c0c387560859308974f7e9c53 # v6.0.1

      - name: Setup Node.js
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: lts/*
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Prepare release context
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        id: prepare
        env:
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
          REGISTRY_AUTH_TOKEN: ${{ secrets.REGISTRY_AUTH_TOKEN }}
          RELEASE_CHANNEL: ${{ inputs.channel }}
          SNAPSHOT_TAG: ${{ inputs.snapshot_tag }}
          PUBLISH_ONLY: ${{ inputs.publish_only }}
          GITHUB_TOKEN: ${{ github.token }}
        with:
          script: |
            const { default: execPrepare } = await import('${{ github.workspace }}/scripts/source/ci/release/prepare.ts');
            await execPrepare(core, exec);

      - name: Build packages
        run: pnpm turbo build

      # --- Internal (mirror): Publish current versions as-is, no snapshot versioning ---
      - name: Mirror packages to registry
        id: mirror
        if: inputs.publish_only
        run: |
          pnpm changeset publish --no-git-tag
          echo "published=true" >> $GITHUB_OUTPUT

      # --- Internal: Publish snapshot packages and create GitHub pre-releases ---
      - name: Publish snapshot packages
        id: snapshot
        if: inputs.channel == 'internal' && !inputs.publish_only
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          GITHUB_TOKEN: ${{ github.token }}
          SNAPSHOT_TAG: ${{ inputs.snapshot_tag || '' }}
          SKIP_GITHUB_RELEASES: ${{ inputs.skip_github_releases }}
          REGISTRY_URL: ${{ secrets.REGISTRY_URL }}
        with:
          script: |
            const { default: execSnapshot } = await import('${{ github.workspace }}/scripts/source/ci/release/snapshot.ts');
            await execSnapshot(core, exec, github, context);

      # --- Public: Standard changesets flow (version PR → merge → publish) ---
      - name: Create Release Pull Request or Publish
        id: changesets
        if: inputs.channel == 'public'
        uses: changesets/action@6a0a831ff30acef54f2c6aa1cbbc1096b066edaf # v1.7.0
        with:
          version: pnpm changeset version
          publish: pnpm changeset publish
          commit: "ci: release packages"
          title: "[CI] Release Packages"
          createGithubReleases: true
        env:
          GITHUB_TOKEN: ${{ github.token }}
          NPM_TOKEN: ${{ secrets.REGISTRY_AUTH_TOKEN }}

      # --- Slack announcement (generated here, sent by caller workflows) ---
      - name: Generate Slack Announcement
        id: announcement
        if: |
          inputs.notify_slack &&
          ((inputs.channel == 'internal' && steps.snapshot.outputs.published == 'true') ||
          (inputs.channel == 'public' && steps.changesets.outputs.published == 'true'))
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PUBLISHED_PACKAGES: ${{ inputs.channel == 'internal' && steps.snapshot.outputs.publishedPackages || steps.changesets.outputs.publishedPackages }}
          REGISTRY_PACKAGE_BASE_URL: ${{ secrets.REGISTRY_PACKAGE_BASE_URL }}
          RELEASE_CHANNEL: ${{ inputs.channel }}
        with:
          script: |
            const { default: execAnnouncement } = await import('${{ github.workspace }}/scripts/source/ci/release/announce.ts');
            await execAnnouncement(core);

      - name: Notify on Slack
        if: inputs.notify_slack && steps.announcement.outcome == 'success'
        uses: slackapi/slack-github-action@af78098f536edbc4de71162a307590698245be95 # v3.0.1
        with:
          webhook: ${{ secrets.SLACK_WEBHOOK_URL }}
          webhook-type: incoming-webhook
          payload: ${{ steps.announcement.outputs.slackWebhookPayload }}
