name: Publish Beta

on:
  workflow_dispatch:
    inputs:
      notify_slack:
        description: Notify in Slack
        type: boolean
        default: true

concurrency: ${{ github.workflow }}-${{ github.ref }}

jobs:
  release:
    name: Release Beta
    if: github.repository == 'adobe/aio-commerce-sdk'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      packages: write
      id-token: write
    steps:
      - name: Ensure running from main
        if: github.ref != 'refs/heads/main'
        run: |
          echo "::error::Publish Beta should only be run from main (triggered from ${{ github.ref }}). Use Publish Alpha to snapshot other branches."
          exit 1

      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: ./.github/actions/setup-release
        with:
          token: ${{ secrets.ADOBE_BOT_NPM_TOKEN }}

      - uses: ./.github/actions/publish-snapshot
        id: snapshot

      - uses: ./.github/actions/notify-slack
        if: inputs.notify_slack && steps.snapshot.outputs.published == 'true'
        with:
          published-packages: ${{ steps.snapshot.outputs.publishedPackages }}
          registry-package-base-url: "https://npmx.dev/package"
          slack-webhook-url: ${{ secrets.SLACK_WEBHOOK_URL }}
